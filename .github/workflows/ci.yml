name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          - Packages/ActivityCore
          - Packages/ActivityActions
          - Packages/ActivityMCP
          - Apps/ActivityManager
          - Apps/amctl
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.package }}/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('{0}/Package.resolved', matrix.package), format('{0}/Package.swift', matrix.package)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-

      - name: swift test
        working-directory: ${{ matrix.package }}
        run: swift test --parallel --enable-code-coverage

      - name: Export coverage (lcov)
        working-directory: ${{ matrix.package }}
        run: |
          BIN_PATH="$(swift build --show-bin-path)"
          PROFDATA="$BIN_PATH/codecov/default.profdata"
          if [ ! -f "$PROFDATA" ]; then
            echo "No profdata for ${{ matrix.package }} — skipping coverage export."
            exit 0
          fi
          # Find any test bundle binary swift produces.
          XCTEST_BIN=$(find "$BIN_PATH" -maxdepth 2 -name "*.xctest" -print -quit || true)
          if [ -z "$XCTEST_BIN" ]; then
            XCTEST_BIN=$(find "$BIN_PATH" -maxdepth 2 -type f -perm +111 -name "*PackageTests*" -print -quit || true)
          fi
          if [ -z "$XCTEST_BIN" ]; then
            echo "No xctest bundle to extract coverage from — skipping."
            exit 0
          fi
          BIN_TO_EXPORT="$XCTEST_BIN"
          if [ -d "$XCTEST_BIN" ]; then
            BIN_TO_EXPORT="$XCTEST_BIN/Contents/MacOS/$(basename "$XCTEST_BIN" .xctest)"
          fi
          mkdir -p "$GITHUB_WORKSPACE/coverage"
          SAFE_NAME=$(echo "${{ matrix.package }}" | tr '/' '_')
          xcrun llvm-cov export \
            "$BIN_TO_EXPORT" \
            -instr-profile "$PROFDATA" \
            -format=lcov > "$GITHUB_WORKSPACE/coverage/$SAFE_NAME.lcov"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ strategy.job-index }}
          path: coverage/*.lcov
          if-no-files-found: ignore

  release-build:
    name: release build smoke
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: swift build -c release (ActivityManager)
        run: swift build --package-path Apps/ActivityManager -c release --arch arm64

      - name: swift build -c release (activity-mcp)
        run: swift build --package-path Apps/activity-mcp -c release --arch arm64

      - name: swift build -c release (amctl)
        run: swift build --package-path Apps/amctl -c release --arch arm64

      - name: Bundle dry-run
        run: bash Scripts/build-release.sh

      - name: Verify bundle layout
        run: |
          test -x build/release/ActivityManager.app/Contents/MacOS/ActivityManager
          test -x build/release/ActivityManager.app/Contents/MacOS/activity-mcp
          test -x build/release/ActivityManager.app/Contents/MacOS/amctl
          test -f build/release/ActivityManager.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" build/release/ActivityManager.app/Contents/Info.plist
          ./build/release/ActivityManager.app/Contents/MacOS/amctl --help

  lint:
    name: swiftlint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint lint --strict --reporter github-actions-logging

  security:
    name: security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks needs history to scan past commits

      - name: Semgrep (OWASP Top Ten + JS + Swift)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/swift
            p/secrets
        env:
          SEMGREP_TIMEOUT: "300"

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  coverage:
    name: coverage upload
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage
          pattern: coverage-*
          merge-multiple: true

      - name: List coverage files
        run: ls -la coverage/ || echo "no coverage files"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/*.lcov
          flags: unittests
          name: ai-activity-manager-macos
          fail_ci_if_error: false
          verbose: true
