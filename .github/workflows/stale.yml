name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14
            days unless there's new activity. Add a comment or remove the
            `stale` label to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 14
            days unless there's new activity.
          close-issue-message: "Closing as stale. Re-open if this is still relevant."
          close-pr-message: "Closing as stale. Re-open when you're ready to continue."
